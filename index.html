<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard</title>
  <style>
    body { font-family: Arial; text-align: center; background: #111; color: #0f0; }
    .card { margin: 20px; padding: 20px; border: 1px solid #0f0; }
  </style>
</head>
<body>

<h1>BTC Trading Bot</h1>

<div class="card">
  <h2>Live Price</h2>
  <p id="price">Loading...</p>
</div>

<script>
async function fetchPrice() {
    try {
        const proxy = "https://api.allorigins.win/raw?url=";
        const url = proxy + encodeURIComponent("https://api.delta.exchange/v2/tickers/BTCUSDTPERP");

        const res = await fetch(url);
        const data = await res.json();

        document.getElementById("price").innerText = data.result.last_price;

    } catch (err) {
        document.getElementById("price").innerText = "Error loading price";
        console.error("Fetch error:", err);
    }
}

setInterval(fetchPrice, 5000);
fetchPrice();
</script>

</body>
</html>
