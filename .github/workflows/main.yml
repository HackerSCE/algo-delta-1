name: Run Trading Bot Every 30 Min

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # ✅ VERY IMPORTANT

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true   # ✅ IMPORTANT

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        run: python trading_bot.py

      - name: Commit and Push data.json
        run: |
         git config user.name "github-actions"
         git config user.email "actions@github.com"

         echo "----- DATA.JSON CONTENT -----"
         cat data.json

         git add data.json

         git commit -m "Update BTC price" || echo "No changes to commit"

         git push origin main
